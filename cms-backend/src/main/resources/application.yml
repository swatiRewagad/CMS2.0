server:
  port: 8082
  tomcat:
    threads:
      max: 400
      min-spare: 50
    max-connections: 10000
    accept-count: 500
    connection-timeout: 5000
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 5000
      pool-name: CMS-HikariPool
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

cms:
  attachments:
    root-path: ${CMS_ATTACHMENTS_PATH:C:/cms-attachments}
    max-file-size: ${CMS_MAX_FILE_SIZE:52428800}
    chunk-size: ${CMS_CHUNK_SIZE:5242880}
    allowed-types: ${CMS_ALLOWED_TYPES:pdf,png,jpg,jpeg,doc,docx,xls,xlsx,txt,csv,zip}
    max-files-per-complaint: ${CMS_MAX_FILES:10}
    temp-dir: ${CMS_TEMP_DIR:temp-chunks}
  rate-limit:
    complaints-per-minute: ${RATE_LIMIT_CPM:10}
    api-requests-per-second: ${RATE_LIMIT_RPS:100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: cms-backend

logging:
  level:
    com.hrms.cms: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:cms_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.hrms.cms: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:mysql://cms-mysql:3306/cms_db?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=UTC&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 3000
      pool-name: CMS-HikariPool-Prod
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
  data:
    redis:
      host: ${REDIS_HOST:cms-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8
  cache:
    redis:
      time-to-live: 600000

server:
  tomcat:
    threads:
      max: 800
      min-spare: 100
    max-connections: 20000
    accept-count: 1000

logging:
  level:
    com.hrms.cms: WARN
    org.hibernate.SQL: ERROR
