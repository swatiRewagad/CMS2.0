spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: none

cms:
  attachments:
    root-path: ${java.io.tmpdir}/cms-test-attachments
    max-file-size: 52428800
    chunk-size: 5242880
    allowed-types: pdf,png,jpg,jpeg,doc,docx,xls,xlsx,txt,csv,zip,mp4,webm,ogg,mov,mp3,wav,aac
    max-files-per-complaint: 10
    temp-dir: temp-chunks
