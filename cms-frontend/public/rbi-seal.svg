<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Top text: RESERVE BANK OF INDIA -->
  <defs>
    <path id="topArc" d="M 25,100 A 75,75 0 0,1 175,100"/>
    <path id="bottomArc" d="M 175,108 A 75,75 0 0,1 25,108"/>
  </defs>
  <text font-size="12" fill="#1a1a1a" font-family="serif" letter-spacing="1">
    <textPath href="#topArc" startOffset="8%">RESERVE BANK OF INDIA</textPath>
  </text>
  <text font-size="12" fill="#1a1a1a" font-family="serif" letter-spacing="0.5">
    <textPath href="#bottomArc" startOffset="12%">भारतीय रिज़र्व बैंक</textPath>
  </text>

  <!-- Stars on sides -->
  <text x="22" y="105" font-size="14" fill="#1a1a1a">★</text>
  <text x="172" y="105" font-size="14" fill="#1a1a1a">★</text>

  <!-- Central: Ashoka Lion Capital (stylized) -->
  <g transform="translate(65, 42)">
    <!-- Abacus/top disc -->
    <ellipse cx="35" cy="15" rx="12" ry="5" fill="#1a1a1a"/>
    <!-- Lions body -->
    <path d="M 20,20 Q 25,18 30,22 Q 35,15 40,22 Q 45,18 50,20 L 48,40 L 22,40 Z" fill="#1a1a1a"/>
    <!-- Dharma wheel -->
    <circle cx="35" cy="48" r="10" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <circle cx="35" cy="48" r="3" fill="#1a1a1a"/>
    <line x1="35" y1="38" x2="35" y2="58" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="25" y1="48" x2="45" y2="48" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="28" y1="41" x2="42" y2="55" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="42" y1="41" x2="28" y2="55" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Base -->
    <rect x="18" y="60" width="34" height="5" fill="#1a1a1a" rx="2"/>
    <rect x="15" y="65" width="40" height="4" fill="#1a1a1a" rx="1"/>
    <!-- Pedestal -->
    <rect x="20" y="69" width="30" height="6" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="1"/>
  </g>
</svg>
